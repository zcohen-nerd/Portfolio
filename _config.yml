title: "Zachary Cohen — Engineering Portfolio"
description: "Electromechanical technologist focusing on systems-level mechatronics, PCB design, and integration."
author:
  name: "Zachary Cohen"
  email: "zcohen-nerd@gmail.com"
  github: "https://github.com/zcohen-nerd"
  linkedin: "https://www.linkedin.com/in/zachary-cohen-nerd/"

# GitHub Pages-supported theme
theme: jekyll-theme-cayman

# Clean URLs
permalink: pretty

# Site URL configuration
url: "https://zcohen-nerd.github.io"
baseurl: "/Portfolio" # GitHub repository name

# Custom navigation metadata
navigation:
  - name: "Projects"
    link: "/projects/"
  - name: "Teaching"
    link: "/teaching/"
  - name: "Documentation"
    link: "/documentation/"

# SEO and social plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Social and SEO metadata
twitter:
  username: zcohen_nerd # Update if you have Twitter
social:
  name: Zachary Cohen
  links:
    - https://github.com/zcohen-nerd
    - https://www.linkedin.com/in/zachary-cohen-nerd/

# Exclude build artifacts
exclude:
  - README-local.md
  - node_modules
  - vendor
  - scripts
