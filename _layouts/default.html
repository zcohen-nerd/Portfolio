<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  {% seo %}
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  
  <!-- Favicon and App Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/zcohen-icon-logo.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="96x96" href="{{ '/assets/images/zcohen-icon-logo.png' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/zcohen-icon-logo.png' | relative_url }}">
  <meta name="theme-color" content="#0A1F44">
  
  <!-- Custom styles with color scheme -->
  <style>
    :root {
      --primary-dark: #0A1F44;
      --primary-bright: #00B8D9;
      --accent-yellow: #F5C542;
      --neutral-light: #E5E5E5;
      --white: #ffffff;
    }
    
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
      line-height: 1.6;
      background-color: var(--white);
      color: var(--primary-dark);
    }
    
    .page-header { 
      background: linear-gradient(120deg, var(--primary-dark), var(--primary-bright)); 
      color: var(--white);
    }
    
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      margin: 2rem 0;
    }
    
    .project-card {
      border: 1px solid var(--neutral-light);
      border-radius: 12px;
      padding: 1.5rem;
      background: var(--white);
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(10, 31, 68, 0.1);
    }
    
    .project-card:hover {
      box-shadow: 0 8px 24px rgba(10, 31, 68, 0.2);
      transform: translateY(-2px);
      border-color: var(--primary-bright);
    }
    
    .placeholder-img {
      background: linear-gradient(135deg, var(--neutral-light), var(--white));
      border: 2px dashed var(--primary-bright);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--primary-dark);
      font-style: italic;
      min-height: 200px;
      margin: 1rem 0;
      text-align: center;
      padding: 1rem;
    }
    
    .placeholder-img small {
      color: var(--primary-bright);
      margin-top: 0.5rem;
      font-size: 0.85em;
    }
    
    h1, h2, h3, h4 {
      color: var(--primary-dark);
    }
    
    a {
      color: var(--primary-bright);
      text-decoration: none;
    }
    
    a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }
    
    .btn-primary {
      background: var(--primary-bright);
      color: var(--white);
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      border: none;
      font-weight: 500;
      transition: background 0.2s;
    }
    
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    
    .highlight-box {
      background: linear-gradient(135deg, var(--accent-yellow), #f8e71c);
      padding: 1.5rem;
      border-radius: 8px;
      margin: 1.5rem 0;
      border-left: 4px solid var(--primary-dark);
    }
    
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.85em;
      font-weight: 500;
      background: var(--primary-bright);
      color: var(--white);
    }
    
    .project-status {
      color: var(--primary-dark);
      font-size: 0.9em;
      margin-top: 1rem;
      margin-bottom: 0;
      font-style: italic;
    }
    
    .project-status strong {
      color: var(--primary-bright);
      font-weight: 600;
    }
    
    /* Content container improvements */
    .container-lg {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .px-3 {
      padding-left: 2rem !important;
      padding-right: 2rem !important;
    }
    
    @media (max-width: 768px) {
      .px-3 {
        padding-left: 1.5rem !important;
        padding-right: 1.5rem !important;
      }
    }
    
    @media (max-width: 480px) {
      .px-3 {
        padding-left: 1rem !important;
        padding-right: 1rem !important;
      }
    }
    
    /* Better content spacing */
    .markdown-body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: none;
      margin: 0;
    }
    
    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body dl,
    .markdown-body blockquote {
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }
    
    /* Enhanced horizontal dividers */
    hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary-bright), transparent);
      margin: 2rem 0 !important;
    }
    
    /* Professional headshot styling */
    img[alt*="Professional Headshot"] {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid var(--primary-bright);
      box-shadow: 0 4px 16px rgba(10, 31, 68, 0.2);
      margin: 0 auto 1.5rem auto;
      display: block;
    }
    
    @media (max-width: 768px) {
      img[alt*="Professional Headshot"] {
        width: 150px;
        height: 150px;
      }
    }
    
    .hero-section {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-bright) 100%);
      color: var(--white);
      padding: 4rem 2rem;
      text-align: center;
      margin-left: -2rem;
      margin-right: -2rem;
      margin-bottom: 3rem;
      border-radius: 0 0 20px 20px;
      position: relative;
    }
    
    @media (max-width: 768px) {
      .hero-section {
        margin-left: -1.5rem;
        margin-right: -1.5rem;
        padding: 3rem 1.5rem;
      }
    }
    
    @media (max-width: 480px) {
      .hero-section {
        margin-left: -1rem;
        margin-right: -1rem;
        padding: 3rem 1rem;
      }
    }
    
    .hero-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    
    .hero-logo {
      height: 4rem;
      width: auto;
      filter: brightness(0) invert(1);
      transition: transform 0.3s ease;
    }
    
    .hero-logo:hover {
      transform: scale(1.1);
    }
    
    .hero-text {
      text-align: left;
    }
    
    .hero-section h1 {
      color: var(--white);
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    
    .hero-section p {
      font-size: 1.2rem;
      opacity: 0.9;
    }
    
    @media (max-width: 768px) {
      .hero-brand {
        flex-direction: column;
        gap: 1rem;
      }
      
      .hero-text {
        text-align: center;
      }
      
      .hero-logo {
        height: 3rem;
      }
    }
  </style>
</head>

<body>
  {% include navigation.html %}
  
  <div class="container-lg px-3 my-5 markdown-body">
    {% if page.title and page.show_title != false %}
      <h1><a href="{{ site.url }}{{ site.baseurl }}">{{ page.title }}</a></h1>
    {% endif %}

    {{ content }}
  </div>

  <footer style="background: #f6f8fa; padding: 2rem 0; margin-top: 4rem; text-align: center; color: #586069;">
    <div class="container-lg px-3">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name }}. Built with Jekyll and GitHub Pages.</p>
      <p>
        <a href="{{ site.author.github }}" target="_blank" rel="noopener">GitHub</a> •
        <a href="{{ site.author.linkedin }}" target="_blank" rel="noopener">LinkedIn</a> •
        <a href="mailto:{{ site.author.email }}">Email</a>
      </p>
    </div>
  </footer>

  {% if site.google_analytics %}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ site.google_analytics }}');
    </script>
  {% endif %}
</body>
</html>
