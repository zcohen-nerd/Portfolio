<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    {% include head.html %}
  </head>
  <body>
    {% include header.html %}
    <main class="page-content" aria-label="Content">
      <div class="container">
        {% if page.title and page.show_title != false %}
          <h1>{{ page.title }}</h1>
        {% endif %}
        {{ content }}
      </div>
    </main>
    {% include footer.html %}
  </body>
</html>
