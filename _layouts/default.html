<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    {% include head.html %}
  </head>
  <body>
    {% include header.html %}
    <main class="page-content" aria-label="Content">
      <div class="container">
        {% if page.title and page.show_title != false %}
          <h1>{{ page.title }}</h1>
        {% endif %}
        {{ content }}
      </div>
    </main>
    {% include footer.html %}
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ startOnLoad: false, theme: 'default' });
      document.querySelectorAll('pre code.language-mermaid').forEach(function(codeEl) {
        const diagram = document.createElement('pre');
        diagram.className = 'mermaid';
        diagram.textContent = codeEl.textContent;
        codeEl.closest('pre').replaceWith(diagram);
      });
      mermaid.run().catch(function(err) { console.error('Mermaid render error:', err); });
    </script>
  </body>
</html>
