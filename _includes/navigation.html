<!-- navigation.html — unused, navigation is handled in header.html -->
<!-- To use: {% include navigation.html %} -->
<nav class="site-nav">
  {% for nav_item in site.navigation %}
    <a href="{{ nav_item.link | relative_url }}"
       {% if page.url contains nav_item.link %}class="active"{% endif %}>
      {{ nav_item.name }}
    </a>
  {% endfor %}
</nav>
