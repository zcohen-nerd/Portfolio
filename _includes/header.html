<!-- ───────────────────────────────────────────────
     Custom Header / Navigation
     Zachary Cohen Portfolio
     Compatible with Jekyll Theme: Cayman
─────────────────────────────────────────────── -->
<header class="site-header">
  <div class="wrapper" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;">
    <!-- Logo / Site Title -->
    <div class="site-title">
      <a href="{{ site.baseurl }}/" style="text-decoration: none; color: inherit;">
        <img src="{{ '/assets/images/zcohen-nerd-logo.png' | relative_url }}" alt="ZCohen Nerd Logo" height="36" style="vertical-align: middle; margin-right: 8px;">
        <strong>{{ site.title }}</strong>
      </a>
    </div>
    <!-- Navigation Menu -->
    <nav class="site-nav">
      {% if site.navigation %}
        <ul style="list-style: none; margin: 0; padding: 0; display: flex; gap: 1.25rem;">
          {% for item in site.navigation %}
            <li>
              <a href="{{ site.baseurl }}{{ item.link }}" style="text-decoration: none; color: #0366d6; font-weight: 500;">
                {{ item.name }}
              </a>
            </li>
          {% endfor %}
        </ul>
      {% endif %}
    </nav>
  </div>
  <hr style="margin-top: 1rem;">
</header>
